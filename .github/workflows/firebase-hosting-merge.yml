# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting and Functions on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: mcmullin-xyz
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm --prefix functions ci
      - run: npm run build
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCMULLIN_XYZ }}'
          channelId: live
          projectId: mcmullin-xyz
      - name: Deploy Firebase Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCMULLIN_XYZ }}' > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npx firebase-tools deploy --only functions --project "$FIREBASE_PROJECT_ID" --non-interactive
